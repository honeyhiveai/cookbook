agent_control_specification_version: "0.3.1-beta"
metadata:
  name: honeyhive_support_guardrails
policies:
  guardrails:
    type: rego
    bundle: ./policy
    query: data.honeyhive.guardrails.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    policy:
      id: guardrails
  output:
    policy_target: "$.output"
    policy_target_kind: assistant_output
    policy:
      id: guardrails
tools:
  send_email:
    type: Tool
    id: send_email
    clearance: internal
  wire_payment:
    type: Tool
    id: wire_payment
    clearance: internal
